name: Build YueLink

# ┌───────────────────────────────────────────────────────────────────────┐
# │ PUBLIC CI MIRROR — 本仓不含源码。源码在私有 onesyue/yuelink。见 README。         │
# │ 触发：在本仓打同名 tag 推送 → checkout 私有仓同名 tag。产物全进 R2。       │
# └───────────────────────────────────────────────────────────────────────┘
#
# Release builds. One matrix job covers every platform; release downloads
# all artifacts in one shot. Modeled after FlClash's build.yaml — same
# 3-job shape (build → release candidate → private signer), one matrix row per
# target. This public builder never receives the updater-manifest private key.
#
# Triggers:
#   • v*  tag → stable release
#   • vX.Y.Z-pre[.N] tag → immutable pre-release artifacts (no updater root)
#   • workflow_dispatch
#
# Analyze + integration tests live in ci.yml (master/PR/manual). The release
# preflight below independently re-runs every hard gate, so a tag cannot race
# or bypass a sibling workflow.

on:
  push:
    # The floating `pre` tag is gone with the pre-release update channel.
    # `vX.Y.Z-pre` still builds (internal test artifacts + a GitHub
    # prerelease) but no longer publishes any updater manifest.
    tags: ['v*']
  workflow_dispatch:
    inputs:
      only:
        description: '只构建某平台(测试用,正式发版 tag 触发恒为全平台)'
        type: choice
        default: all
        options: [all, android, ios, macos, windows, linux]

concurrency:
  group: ${{ github.workflow }}
  # A second tag queues behind the first. Cancelling a production build can
  # leave only some immutable R2 artifacts/candidate inputs; the separate
  # private signer has its own monotonic root-promotion guard.
  cancel-in-progress: false

# Least-privilege default. Build jobs add OIDC only for provenance;
# R2 publication does not need repository write permission. Adding the
# top-level block doesn't change behavior for jobs that already declare
# their own `permissions:`; it only narrows the floor for jobs that
# don't.
permissions:
  contents: read

env:
  FLUTTER_VERSION: '3.44.7'
  # Go 1.26.5 contains the July 2026 crypto/tls security fixes. Keep the
  # release builder and govulncheck on this exact patch release; using a
  # floating 1.26 selector can silently rebuild the same tag with a different
  # standard library.
  GO_VERSION: '1.26.5'
  # Production builds consume the reviewed module graph exactly. `core/go.mod`
  # and go.sum are tidy against the pinned mihomo submodule; dependency drift
  # must fail the build instead of being resolved implicitly on a runner.
  GOFLAGS: -mod=readonly
  # Opt JS actions (actions/attest*, etc.) into Node.js 24 now, ahead of the
  # 2026-06-16 forced default — silences the recurring Node 20 deprecation
  # warning. Safe to drop once Node 24 is the runner default.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Single matrix build — one row per target platform.
  # Every row: setup go+flutter → build core → install core → flutter build
  #            → package → upload artifact named yuelink-<platform>.
  # ───────────────────────────────────────────────────────────────────────────
  # 动态矩阵:按 workflow_dispatch 的 only 输入裁剪要构建的平台。job 级 if 无法用
  # matrix 上下文(GitHub 限制),故用一个轻量 prepare job 算出矩阵,build 用
  # fromJSON 消费。tag/push 发版时 only 为空 → 全平台。
  prepare:
    name: Prepare matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        env:
          ONLY: ${{ github.event.inputs.only }}
        run: |
          set -euo pipefail
          ALL='[{"platform":"android","os":"ubuntu-latest"},{"platform":"ios","os":"macos-latest"},{"platform":"macos","os":"macos-latest"},{"platform":"windows","os":"windows-latest"},{"platform":"linux","os":"ubuntu-latest"}]'
          if [ -z "${ONLY:-}" ] || [ "$ONLY" = "all" ]; then
            sel="$ALL"
          else
            sel=$(printf '%s' "$ALL" | jq -c --arg p "$ONLY" '[.[]|select(.platform==$p)]')
          fi
          printf 'matrix={"include":%s}\n' "$sel" >> "$GITHUB_OUTPUT"
          echo "选中平台: ${ONLY:-all}"

  preflight:
    name: Release preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag_kind: ${{ steps.classify.outputs.kind }}
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          repository: onesyue/yuelink
          ref: ${{ github.ref_name }}
          ssh-key: ${{ secrets.SRC_DEPLOY_KEY }}
          fetch-depth: 0
          submodules: recursive
          persist-credentials: false

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            core/go.sum
            service/go.sum

      - name: Classify release tag once
        id: classify
        env:
          REF: ${{ github.ref }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ "$REF" == refs/tags/* ]]; then
            kind="$(bash scripts/ci/release_tag.sh kind "$TAG")"
          else
            kind="nonrelease"
          fi
          echo "kind=$kind" >> "$GITHUB_OUTPUT"

      - name: Run in-workflow release gates
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          R2_KEY_ID: ${{ secrets.R2_KEY_ID }}
          R2_APP_KEY: ${{ secrets.R2_APP_KEY }}
        run: bash scripts/ci/release_preflight.sh

  build:
    name: Build (${{ matrix.platform }})
    needs: [prepare, preflight]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write      # OIDC for build-provenance attestation
      attestations: write  # store the signed attestation per platform binary
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      # 2026-06-01: Android(及 Linux)构建 native libs 时撑爆 ubuntu runner 磁盘
      # (No space left on device @ mergeReleaseNativeLibs)。先清掉用不到的大件
      # (dotnet/ghc/boost/swift/docker 镜像,~25–30G),不碰 Android SDK/NDK。
      - name: Free disk space (Linux runners)
        if: runner.os == 'Linux'
        run: |
          echo "before:"; df -h / | tail -1
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
            /usr/local/share/boost /usr/local/share/powershell \
            /opt/hostedtoolcache/CodeQL 2>/dev/null || true
          sudo docker image prune -af 2>/dev/null || true
          echo "after:"; df -h / | tail -1

      # CI 镜像仓：checkout 私有 onesyue/yuelink 同名 tag 源码到工作区根。
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          repository: onesyue/yuelink
          ref: ${{ github.ref_name }}
          ssh-key: ${{ secrets.SRC_DEPLOY_KEY }}
          submodules: recursive
          persist-credentials: false

      # ── Toolchains (Go for core, Flutter for app, Java for android) ───────
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: core/go.sum

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Setup Java (Android only)
        if: matrix.platform == 'android'
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android NDK
        if: matrix.platform == 'android'
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Install Android NDK r27
        if: matrix.platform == 'android'
        shell: bash
        run: |
          sdkmanager "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> $GITHUB_ENV
          echo "ANDROID_NDK=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> $GITHUB_ENV

      # Gradle 依赖 + AGP + 转换产物缓存(键随 gradle 配置变化失效)。APK 构建本体
      # 是编译,缓存救不了那 10min,但能省依赖/AGP 重下,热运行小幅提速。
      - name: Cache Gradle
        if: matrix.platform == 'android'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libblkid-dev liblzma-dev ninja-build \
            libglib2.0-dev libpango1.0-dev libcairo2-dev \
            libsecret-1-dev libstdc++-12-dev \
            libkeybinder-3.0-dev libayatana-appindicator3-dev \
            libasound2-dev libmpv-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libcurl4-openssl-dev libc-ares-dev \
            pkg-config cmake clang
          {
            echo "CMAKE_PREFIX_PATH=/usr"
            echo "CMAKE_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu"
            echo "CMAKE_INCLUDE_PATH=/usr/include"
          } >> "$GITHUB_ENV"

      # ── Geodata: declared as Flutter assets, .gitignored — fetch at CI ────
      # (v1.2.90) The 23 MB GeoIP/GeoSite.dat bundle + its CI download/assert
      # is GONE. The client no longer inlines GEOSITE/GEOIP rules — it seeds
      # the ~1 MB `.mrs` rule-provider set (assets/ruleset/, committed to git)
      # into ./ruleset/yueto/ at startup. The private subtree avoids colliding
      # with generic paths from imported third-party subscriptions.
      # This structurally eliminates the v1.2.87/88 "bundled geodata vs rules
      # mismatch" brick class: there is no geodata pack to mismatch. The .mrs
      # are checked out from git (no build-time network dependency); this
      # guard proves the checkout carries the exact reviewed inventory.
      - name: Verify bundled ruleset (.mrs seed set)
        shell: bash
        run: |
          set -euo pipefail
          dir=assets/ruleset
          expected="$dir/inventory.txt"
          test -f "$expected"
          actual=$(mktemp)
          trap 'rm -f "$actual"' EXIT
          find "$dir" -maxdepth 1 -type f -name '*.mrs' \
            -exec basename {} \; | LC_ALL=C sort > "$actual"
          grep -Ev '^[[:space:]]*(#|$)' "$expected" \
            | LC_ALL=C sort | diff -u - "$actual" || {
              echo "::error::bundled .mrs inventory drift"
              exit 1
            }
          count=$(wc -l < "$actual" | tr -d ' ')
          [ "$count" -eq 39 ] || {
            echo "::error::expected exactly 39 .mrs assets, found $count"
            exit 1
          }
          # Every .mrs is a zstd frame — magic 0x28 0xB5 0x2F 0xFD. A file that
          # isn't (e.g. an HTML 404 page committed by mistake) would brick
          # rule-provider load on device; catch it here. Use `od` (POSIX,
          # present on ubuntu/macos/git-bash) — NOT `xxd`, which is missing on
          # some Windows/macOS runners.
          for f in "$dir"/*.mrs; do
            size=$(wc -c < "$f" | tr -d ' ')
            [ "$size" -gt 64 ] || {
              echo "::error::$f is truncated ($size bytes)"
              exit 1
            }
            magic=$(od -An -tx1 -N4 "$f" | tr -d ' \n')
            if [ "$magic" != "28b52ffd" ]; then
              echo "::error::$f is not a zstd .mrs (magic=$magic) — corrupt seed committed?"
              exit 1
            fi
          done
          echo "ruleset seed OK: exact $count-file inventory, all zstd."

      # ── Resolve version: pubspec for stable, append -pre for pre tag ──────
      # Match both the legacy `pre` overwrite-channel tag and the
      # versioned `vX.Y.Z-pre` / `vX.Y.Z-pre.N` prerelease tags. Before
      # this expansion only `pre` was recognised, so `v1.0.20-pre`
      # slipped through the `else` branch and shipped artifacts named
      # `YueLink-1.0.20-*` (colliding with whatever the eventual stable
      # v1.0.20 release would produce).
      - name: Extract version from pubspec
        shell: bash
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          BUILD_NUM=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f2)
          TAG_KIND="$(bash scripts/ci/release_tag.sh kind "$GITHUB_REF_NAME")"
          case "$TAG_KIND" in
            prerelease)
              if [[ "$VERSION" == *-pre* ]]; then
                APP_VERSION="${VERSION}"
              else
                APP_VERSION="${VERSION}-pre"
              fi
              ;;
            *)
              APP_VERSION="${VERSION}"
              ;;
          esac
          echo "APP_VERSION=${APP_VERSION}" >> $GITHUB_ENV
          echo "BUILD_NUM=${BUILD_NUM}" >> $GITHUB_ENV

      - run: flutter pub get --enforce-lockfile

      # ── Compile Go core (platform-aware) and copy into Flutter dirs ───────
      # Windows + Linux: setup.dart's default builds BOTH amd64 + arm64, but
      # the runners are x86_64 with no arm64 cross-toolchain, so the arm64
      # half fails with `gcc_arm64.S: no such instruction`. Pin to amd64
      # explicitly. Android / iOS / macOS handle their own arch matrices
      # internally (NDK / lipo / static lib).
      - name: Build & install Go core
        shell: bash
        run: |
          case "${{ matrix.platform }}" in
            windows|linux)
              dart setup.dart build -p ${{ matrix.platform }} -a amd64
              ;;
            *)
              dart setup.dart build -p ${{ matrix.platform }}
              ;;
          esac
          dart setup.dart install -p ${{ matrix.platform }}

      # ─────────────────────────────────────────────────────────────────────
      # ANDROID
      # ─────────────────────────────────────────────────────────────────────
      - name: Decode Android keystore
        if: matrix.platform == 'android'
        shell: bash
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | openssl base64 -d -A > android/app/yuelink.jks
          echo "KEYSTORE_PATH=${{ github.workspace }}/android/app/yuelink.jks" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Build APKs (split-per-abi + universal)
        if: matrix.platform == 'android'
        run: |
          flutter build apk --release --split-per-abi \
            --build-name=${{ env.APP_VERSION }} \
            --build-number=${{ env.BUILD_NUM }}
          flutter build apk --release \
            --build-name=${{ env.APP_VERSION }} \
            --build-number=${{ env.BUILD_NUM }}

      - name: Rename APKs
        if: matrix.platform == 'android'
        shell: bash
        run: |
          OUT=build/app/outputs/flutter-apk
          V=${{ env.APP_VERSION }}
          mkdir -p dist
          cp "$OUT/app-arm64-v8a-release.apk"   "dist/YueLink-${V}-android-arm64-v8a.apk"
          cp "$OUT/app-armeabi-v7a-release.apk" "dist/YueLink-${V}-android-armeabi-v7a.apk"
          cp "$OUT/app-x86_64-release.apk"      "dist/YueLink-${V}-android-x86_64.apk"
          cp "$OUT/app-release.apk"             "dist/YueLink-${V}-android-universal.apk"
          ls -lh dist/

      # 2026-06-02: 锁死 APK 签名指纹, 杜绝"签名冲突"。Android 覆盖安装要求新旧包
      # 同一签名 key, 否则报"应用未安装/签名不一致"。这里强校验每个 APK 都是固定的
      # release key(KEYSTORE_BASE64, CN=YueLink); 任何漂移(keystore 缺失误落 debug
      # fallback / 换了 keystore)→ 构建失败, 绝不发出会和已装版本冲突的包。
      # 换 keystore 必须有意识地同步改这里的 EXPECT_SHA256(并知道老用户需重装一次)。
      - name: Verify APK signature is the pinned release key
        if: matrix.platform == 'android'
        shell: bash
        run: |
          set -euo pipefail
          EXPECT_SHA256="2b117c57ef715f3adb7aa4226a8d23de9a6607eff9f0d3f4df2dbdaa069148cc"
          APKSIGNER=$(ls "${ANDROID_SDK_ROOT:-$ANDROID_HOME}"/build-tools/*/apksigner 2>/dev/null | sort -V | tail -1)
          [ -n "$APKSIGNER" ] || { echo "::error::找不到 apksigner"; exit 1; }
          fail=0
          for apk in dist/YueLink-*-android-*.apk; do
            # 取 "...SHA-256 digest: <hex>" 行冒号后的 hex。用 sed 删到最后一个
            # "digest:" 为止,对 apksigner 输出里前缀冒号的数量不敏感(旧 awk -F': '
            # 在新 build-tools 输出格式下会误取标签文字 "certificate SHA-256 digest")。
            got=$("$APKSIGNER" verify --print-certs "$apk" \
                  | sed -n 's/.*SHA-256 digest:[[:space:]]*//p' | head -1 \
                  | tr 'A-F' 'a-f' | tr -d '[:space:]')
            if [ "$got" != "$EXPECT_SHA256" ]; then
              echo "::error::$(basename "$apk") 签名 $got ≠ 预期 release key — 拒绝发布(防签名冲突)"
              fail=1
            else
              echo "✓ $(basename "$apk") : $got"
            fi
          done
          [ "$fail" = "0" ] || exit 1
          echo "✓ 全部 APK 同一 release key — 覆盖安装不会签名冲突"

      # ─────────────────────────────────────────────────────────────────────
      # iOS — TrollStore / sideload (no codesign, signed with ad-hoc cert)
      # ─────────────────────────────────────────────────────────────────────
      - name: Cache CocoaPods (iOS)
        if: matrix.platform == 'ios'
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: |
            ~/.cocoapods
            ios/Pods
          key: pods-ios-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-ios-

      - name: Disable Swift Package Manager (iOS + macOS — force CocoaPods)
        # Flutter 3.44's experimental SPM double-resolves the Sentry xcframework
        # (flutter assemble + xcodebuild) and crashes with "already exists in file
        # system" — a deterministic flake that fails BOTH the iOS and macOS builds.
        # Both targets are CocoaPods-based, so this is functionally a no-op and
        # makes them deterministic.
        if: matrix.platform == 'ios' || matrix.platform == 'macos'
        run: flutter config --no-enable-swift-package-manager

      - name: Build iOS
        if: matrix.platform == 'ios'
        run: |
          flutter build ios --release --no-codesign \
            --build-name=${{ env.APP_VERSION }} \
            --build-number=${{ env.BUILD_NUM }}

      - name: Validate iOS container and extension versions
        if: matrix.platform == 'ios'
        shell: bash
        run: |
          set -euo pipefail
          app="build/ios/iphoneos/Runner.app"
          extension="$app/PlugIns/PacketTunnel.appex"
          app_version="$(plutil -extract CFBundleShortVersionString raw "$app/Info.plist")"
          app_build="$(plutil -extract CFBundleVersion raw "$app/Info.plist")"
          extension_version="$(plutil -extract CFBundleShortVersionString raw "$extension/Info.plist")"
          extension_build="$(plutil -extract CFBundleVersion raw "$extension/Info.plist")"
          [ "$app_version" = "$extension_version" ] &&
          [ "$app_build" = "$extension_build" ] || {
            echo "::error::iOS bundle version mismatch: app=$app_version+$app_build extension=$extension_version+$extension_build"
            exit 1
          }
          echo "iOS bundle versions match: $app_version+$app_build"

      - name: Sign iOS bundle for TrollStore
        if: matrix.platform == 'ios'
        run: |
          # Inner binaries first, then the .app — order matters for TrollStore.
          codesign --force --sign - \
            --entitlements ios/PacketTunnel/PacketTunnel.entitlements \
            build/ios/iphoneos/Runner.app/PlugIns/PacketTunnel.appex
          for fw in build/ios/iphoneos/Runner.app/Frameworks/*.framework; do
            codesign --force --sign - "$fw"
          done
          for dylib in build/ios/iphoneos/Runner.app/Frameworks/*.dylib; do
            [ -e "$dylib" ] && codesign --force --sign - "$dylib"
          done
          codesign --force --sign - \
            --entitlements ios/Runner/Runner.entitlements \
            build/ios/iphoneos/Runner.app

      - name: Verify iOS signatures and VPN entitlements
        if: matrix.platform == 'ios'
        shell: bash
        run: |
          set -euo pipefail
          app="build/ios/iphoneos/Runner.app"
          extension="$app/PlugIns/PacketTunnel.appex"
          codesign --verify --deep --strict --verbose=2 "$app"
          codesign --verify --strict --verbose=2 "$extension"

          runner_entitlements="$RUNNER_TEMP/yuelink-runner-entitlements.plist"
          tunnel_entitlements="$RUNNER_TEMP/yuelink-tunnel-entitlements.plist"
          codesign -d --entitlements :- "$app" \
            > "$runner_entitlements" 2>/dev/null
          codesign -d --entitlements :- "$extension" \
            > "$tunnel_entitlements" 2>/dev/null
          for entitlements in "$runner_entitlements" "$tunnel_entitlements"; do
            group=$(/usr/libexec/PlistBuddy \
              -c 'Print :com.apple.security.application-groups:0' \
              "$entitlements")
            provider=$(/usr/libexec/PlistBuddy \
              -c 'Print :com.apple.developer.networking.networkextension:0' \
              "$entitlements")
            [ "$group" = "group.com.yueto.yuelink" ] &&
            [ "$provider" = "packet-tunnel-provider" ] || {
              echo "::error::iOS VPN entitlement contract mismatch"
              exit 1
            }
          done
          echo "iOS app + PacketTunnel signatures and VPN entitlements verified"

      - name: Package iOS .ipa
        if: matrix.platform == 'ios'
        shell: bash
        run: |
          mkdir -p dist
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          IPA="YueLink-${{ env.APP_VERSION }}-ios.ipa"
          zip -r --symlinks "$IPA" Payload
          mv "$IPA" "${{ github.workspace }}/dist/"
          ls -lh "${{ github.workspace }}/dist/$IPA"

      # ─────────────────────────────────────────────────────────────────────
      # macOS — universal .dmg with squircle icon and optional notarization
      # ─────────────────────────────────────────────────────────────────────
      - name: Cache CocoaPods (macOS)
        if: matrix.platform == 'macos'
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: |
            ~/.cocoapods
            macos/Pods
          key: pods-macos-${{ hashFiles('macos/Podfile.lock') }}
          restore-keys: pods-macos-

      - name: Refresh icons + DMG background
        if: matrix.platform == 'macos'
        run: dart run tool/round_appicon.dart

      - name: Enable macOS desktop
        if: matrix.platform == 'macos'
        run: flutter config --enable-macos-desktop

      - name: Build macOS
        if: matrix.platform == 'macos'
        run: |
          flutter build macos --release \
            --build-name=${{ env.APP_VERSION }} \
            --build-number=${{ env.BUILD_NUM }}

      - name: Stable macOS signing and notarization gate
        if: matrix.platform == 'macos'
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          signing_configured=0
          notarization_configured=0
          if [ -n "${APPLE_CERTIFICATE_BASE64:-}" ] &&
             [ -n "${APPLE_CERTIFICATE_PASSWORD:-}" ] &&
             [ -n "${APPLE_SIGNING_IDENTITY:-}" ]; then
            signing_configured=1
          fi
          if [ "$signing_configured" -eq 1 ] &&
             [ -n "${APPLE_ID:-}" ] &&
             [ -n "${APPLE_PASSWORD:-}" ] &&
             [ -n "${APPLE_TEAM_ID:-}" ]; then
            notarization_configured=1
          fi
          echo "MAC_SIGNING_CONFIGURED=$signing_configured" >> "$GITHUB_ENV"
          echo "MAC_NOTARIZATION_CONFIGURED=$notarization_configured" >> "$GITHUB_ENV"

          if [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            missing=0
            for var in APPLE_CERTIFICATE_BASE64 APPLE_CERTIFICATE_PASSWORD \
              APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
              if [ -z "${!var:-}" ]; then
                echo "::error::stable macOS release missing $var"
                missing=$((missing + 1))
              fi
            done
            [ "$missing" -eq 0 ] || exit 1
          fi

      - name: Import signing certificate (macOS)
        if: matrix.platform == 'macos' && env.MAC_SIGNING_CONFIGURED == '1'
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychains -d user -s build.keychain login.keychain
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          rm -f /tmp/cert.p12
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Sign YueLink.app with hardened runtime
        if: matrix.platform == 'macos' && env.MAC_SIGNING_CONFIGURED == '1'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          APP="build/macos/Build/Products/Release/YueLink.app"
          find "$APP/Contents/Frameworks" -type f -name '*.dylib' \
            -exec codesign --force --options runtime --timestamp \
                  --sign "$APPLE_SIGNING_IDENTITY" {} \; 2>/dev/null || true
          find "$APP/Contents/Frameworks" -type d -name '*.framework' \
            -exec codesign --force --options runtime --timestamp \
                  --sign "$APPLE_SIGNING_IDENTITY" {} \; 2>/dev/null || true
          codesign --force --options runtime --timestamp \
            --entitlements macos/Runner/Release.entitlements \
            --sign "$APPLE_SIGNING_IDENTITY" "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"

      - name: Ad-hoc sign YueLink.app (no Apple account — free Gatekeeper relief)
        if: matrix.platform == 'macos' && env.MAC_SIGNING_CONFIGURED != '1'
        run: |
          # Without a paid Developer ID we can't notarize, but an *ad-hoc*
          # signature (codesign --sign -) still gives every Mach-O a valid
          # signature. That matters on Apple Silicon: a downloaded, totally
          # unsigned arm64 .app is rejected outright as "已损坏 / is damaged"
          # and won't open at all. Ad-hoc signing downgrades that to the normal
          # "unidentified developer" Gatekeeper prompt, which the user can
          # bypass via right-click → Open (or the bundled 修复无法打开.command).
          # Sign inside-out: nested code first, bundle last. No entitlements —
          # macOS YueLink uses networksetup + App Support JSON, not
          # entitlement-gated APIs, and ad-hoc + restricted entitlements can
          # break launch.
          APP="build/macos/Build/Products/Release/YueLink.app"
          find "$APP/Contents/Frameworks" -type f \( -name '*.dylib' -o -name '*.so' \) \
            -exec codesign --force --timestamp=none --sign - {} \; 2>/dev/null || true
          find "$APP/Contents/Frameworks" -type d -name '*.framework' \
            -exec codesign --force --timestamp=none --sign - {} \; 2>/dev/null || true
          codesign --force --timestamp=none --sign - "$APP"
          codesign --verify --verbose=2 "$APP" || true

      - name: Package macOS .dmg
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          CREATE_DMG_VERSION=1.3.0
          CREATE_DMG_SHA256=c50d2bc97c3d6292642bac55f530d247eaf4bf65ee605f26b4caf339383e381c
          curl --fail --show-error --silent --location --proto '=https' --tlsv1.2 \
            "https://github.com/create-dmg/create-dmg/archive/refs/tags/v${CREATE_DMG_VERSION}.tar.gz" \
            -o /tmp/create-dmg.tar.gz
          echo "${CREATE_DMG_SHA256}  /tmp/create-dmg.tar.gz" | shasum -a 256 -c -
          tar -xzf /tmp/create-dmg.tar.gz -C /tmp
          CREATE_DMG="/tmp/create-dmg-${CREATE_DMG_VERSION}/create-dmg"
          test -x "$CREATE_DMG"
          DMG_SRC=dmg_source
          mkdir -p "$DMG_SRC" dist
          cp -R build/macos/Build/Products/Release/YueLink.app "$DMG_SRC/"
          cp assets/fix-gatekeeper.command "$DMG_SRC/修复无法打开.command"
          chmod +x "$DMG_SRC/修复无法打开.command"

          # Compose .icns for the DMG volume icon (Finder sidebar + Desktop)
          ICONSET=/tmp/yuelink_volicon.iconset
          rm -rf "$ICONSET" && mkdir -p "$ICONSET"
          ICONS=macos/Runner/Assets.xcassets/AppIcon.appiconset
          cp "$ICONS/app_icon_16.png"   "$ICONSET/icon_16x16.png"
          cp "$ICONS/app_icon_32.png"   "$ICONSET/icon_16x16@2x.png"
          cp "$ICONS/app_icon_32.png"   "$ICONSET/icon_32x32.png"
          cp "$ICONS/app_icon_64.png"   "$ICONSET/icon_32x32@2x.png"
          cp "$ICONS/app_icon_128.png"  "$ICONSET/icon_128x128.png"
          cp "$ICONS/app_icon_256.png"  "$ICONSET/icon_128x128@2x.png"
          cp "$ICONS/app_icon_256.png"  "$ICONSET/icon_256x256.png"
          cp "$ICONS/app_icon_512.png"  "$ICONSET/icon_256x256@2x.png"
          cp "$ICONS/app_icon_512.png"  "$ICONSET/icon_512x512.png"
          cp "$ICONS/app_icon_1024.png" "$ICONSET/icon_512x512@2x.png"
          iconutil -c icns -o /tmp/yuelink_volicon.icns "$ICONSET"

          DMG_NAME="YueLink-${{ env.APP_VERSION }}-macos-universal.dmg"
          set +e
          "$CREATE_DMG" \
            --volname "YueLink" \
            --volicon "/tmp/yuelink_volicon.icns" \
            --background "assets/dmg_background.png" \
            --window-pos 200 120 --window-size 660 400 --icon-size 80 \
            --icon "YueLink.app" 180 170 \
            --app-drop-link 480 170 \
            --icon "修复无法打开.command" 330 340 \
            --hide-extension "YueLink.app" \
            "dist/$DMG_NAME" "$DMG_SRC"
          DMG_EXIT=$?
          set -e
          # exit 2 = DMG created but no signing identity (expected in CI)
          if [ $DMG_EXIT -ne 0 ] && [ $DMG_EXIT -ne 2 ]; then
            echo "ERROR: create-dmg failed ($DMG_EXIT)"; exit 1
          fi
          [ -f "dist/$DMG_NAME" ] || { echo "ERROR: DMG missing"; exit 1; }
          ls -lh "dist/$DMG_NAME"

      - name: Sign and verify macOS DMG
        if: matrix.platform == 'macos' && env.MAC_SIGNING_CONFIGURED == '1'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          DMG_NAME="YueLink-${{ env.APP_VERSION }}-macos-universal.dmg"
          codesign --force --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY" "dist/$DMG_NAME"
          codesign --verify --strict --verbose=2 "dist/$DMG_NAME"

      - name: Notarize DMG
        if: matrix.platform == 'macos' && env.MAC_NOTARIZATION_CONFIGURED == '1'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG_NAME="YueLink-${{ env.APP_VERSION }}-macos-universal.dmg"
          xcrun notarytool submit "dist/$DMG_NAME" \
            --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" --wait --timeout 30m
          xcrun stapler staple "dist/$DMG_NAME"
          xcrun stapler validate "dist/$DMG_NAME"

      - name: Clean up signing keychain
        if: matrix.platform == 'macos' && always() && env.MAC_SIGNING_CONFIGURED == '1'
        run: security delete-keychain build.keychain 2>/dev/null || true

      # ─────────────────────────────────────────────────────────────────────
      # WINDOWS — Inno Setup installer + portable zip
      # ─────────────────────────────────────────────────────────────────────
      - name: Bundle Wintun (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          # Pulls upstream Wintun zip, sha256-verifies against the pinned
          # values in windows/third_party/wintun/wintun.sha256, and stages
          # the amd64 + arm64 DLLs so windows/CMakeLists.txt can install
          # them. Without this the desktop_tun_diagnostics surfaces
          # missing_driver and the UI shows "Wintun 驱动缺失".
          ./scripts/check_windows_wintun_bundle.ps1 -Download

      - name: Build Windows
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          flutter config --enable-windows-desktop
          flutter build windows --release \
            --build-name=${{ env.APP_VERSION }} \
            --build-number=${{ env.BUILD_NUM }}

      - name: Verify Wintun bundle (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          # Post-build: confirm wintun.dll landed next to yuelink.exe with
          # a hash matching one of the pinned arch entries. Release-gate.
          ./scripts/check_windows_wintun_bundle.ps1 -Verify `
            -BundleDir build/windows/x64/runner/Release

      - name: Bundle libclash + service binaries (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $releaseDir = "build\windows\x64\runner\Release"
          $dllSrc = "windows\libs\amd64\libclash.dll"
          if ((Test-Path $dllSrc) -and -not (Test-Path "$releaseDir\libclash.dll")) {
            Copy-Item $dllSrc "$releaseDir\libclash.dll"
          }
          if (-not (Test-Path "$releaseDir\libclash.dll")) {
            Write-Error "libclash.dll missing from Release dir"; exit 1
          }
          $svcSrc = "service\build\windows-amd64"
          foreach ($bin in @("yuelink-service-helper.exe", "yuelink-mihomo.exe")) {
            if (Test-Path "$svcSrc\$bin") {
              Copy-Item "$svcSrc\$bin" "$releaseDir\$bin"
            } else {
              Write-Error "$bin missing from $svcSrc"; exit 1
            }
          }

      - name: Sign Windows binaries
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERT_BASE64)) {
            if ("$env:GITHUB_REF_NAME" -match '^v[0-9]+\.[0-9]+\.[0-9]+$') {
              Write-Error "stable Windows release requires WINDOWS_CERT_BASE64"
              exit 1
            }
            Write-Host "pre/test build has no Windows certificate; leaving binaries unsigned."
            exit 0
          }
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERT_PASSWORD)) {
            if ("$env:GITHUB_REF_NAME" -match '^v[0-9]+\.[0-9]+\.[0-9]+$') {
              Write-Error "stable Windows release requires WINDOWS_CERT_PASSWORD"
              exit 1
            }
            Write-Host "pre/test build has no Windows certificate password; leaving binaries unsigned."
            exit 0
          }
          $certPath = Join-Path $env:RUNNER_TEMP "yuelink-codesign.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CERT_BASE64))
          "WINDOWS_CERT_PATH=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Append

          $releaseDir = "build\windows\x64\runner\Release"
          $targets = @(
            "$releaseDir\yuelink.exe",
            "$releaseDir\yuelink-service-helper.exe",
            "$releaseDir\yuelink-mihomo.exe"
          ) | Where-Object { Test-Path $_ }
          foreach ($target in $targets) {
            & signtool sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com `
              /f $certPath /p $env:WINDOWS_CERT_PASSWORD $target
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            & signtool verify /pa /v $target
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: Generate Inno Setup wizard images
        if: matrix.platform == 'windows'
        shell: bash
        run: dart run tool/round_appicon.dart

      - name: Download VC++ 2015-2022 Redistributable (bundled into installer)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $vcRedist = "windows\vc_redist.x64.exe"
          if (-not (Test-Path $vcRedist)) {
            Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" `
              -OutFile $vcRedist -UseBasicParsing
          }
          $expected = "cc0ff0eb1dc3f5188ae6300faef32bf5beeba4bdd6e8e445a9184072096b713b"
          $actual = (Get-FileHash -Algorithm SHA256 $vcRedist).Hash.ToLowerInvariant()
          if ($actual -ne $expected) {
            Write-Error "vc_redist.x64.exe SHA-256 mismatch: $actual"
            exit 1
          }
          Get-Item $vcRedist | Select-Object Name, Length

      - name: Build Windows installer + portable zip
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          $version = "${{ env.APP_VERSION }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          iscc "/DMyAppVersion=$version" "/DMyAppArch=amd64" windows\installer.iss
          if ($env:WINDOWS_CERT_PATH -and (Test-Path $env:WINDOWS_CERT_PATH)) {
            $installer = Get-ChildItem windows\YueLink-*.exe | Select-Object -First 1
            if ($installer) {
              & signtool sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com `
                /f $env:WINDOWS_CERT_PATH /p $env:WINDOWS_CERT_PASSWORD $installer.FullName
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
              & signtool verify /pa /v $installer.FullName
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            }
          }
          Get-ChildItem windows\YueLink-*.exe | Copy-Item -Destination dist\
          $releaseDir = "build\windows\x64\runner\Release"
          $zipName = "dist\YueLink-$version-windows-amd64-portable.zip"
          Compress-Archive -Path "$releaseDir\*" -DestinationPath $zipName -Force
          Get-ChildItem dist\

      # ─────────────────────────────────────────────────────────────────────
      # LINUX — AppImage only (drops .deb / .rpm — was sprawling for no win)
      # ─────────────────────────────────────────────────────────────────────
      - name: Refresh Linux squircle icon
        if: matrix.platform == 'linux'
        run: dart run tool/round_appicon.dart

      - name: Build Linux
        if: matrix.platform == 'linux'
        run: |
          export PATH="/usr/bin:$PATH"
          curl-config --features | grep -q AsynchDNS
          flutter config --enable-linux-desktop
          flutter build linux --release \
            --build-name=${{ env.APP_VERSION }} \
            --build-number=${{ env.BUILD_NUM }}

      - name: Bundle service binaries + create AppImage
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          BUNDLE_DIR=$(find build/linux -maxdepth 4 -type d -name bundle | head -1)
          if [ -z "$BUNDLE_DIR" ]; then
            echo "ERROR: bundle dir not found"; find build/linux -type d | head -20; exit 1
          fi

          # Copy service mode binaries next to the main yuelink binary
          SVC_SRC="service/build/linux-amd64"
          for bin in yuelink-service-helper yuelink-mihomo; do
            if [ -f "$SVC_SRC/$bin" ]; then
              cp "$SVC_SRC/$bin" "$BUNDLE_DIR/$bin"
              chmod +x "$BUNDLE_DIR/$bin"
            else
              echo "ERROR: $bin missing from $SVC_SRC"; exit 1
            fi
          done

          # Fetch appimagetool and assemble the AppDir
          curl -fSL -o /usr/local/bin/appimagetool \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          echo "b90f4a8b18967545fda78a445b27680a1642f1ef9488ced28b65398f2be7add2  /usr/local/bin/appimagetool" \
            | sha256sum -c -
          chmod +x /usr/local/bin/appimagetool

          VERSION="${{ env.APP_VERSION }}"
          APPDIR="build/AppDir"
          mkdir -p dist
          OUTPUT="dist/YueLink-${VERSION}-linux-amd64.AppImage"

          rm -rf "$APPDIR"
          mkdir -p "$APPDIR/usr/bin" "$APPDIR/usr/share/applications" \
                   "$APPDIR/usr/share/icons/hicolor/256x256/apps"
          cp -r "$BUNDLE_DIR/." "$APPDIR/usr/bin/"

          cat > "$APPDIR/usr/share/applications/yuelink.desktop" << 'DESKTOP'
          [Desktop Entry]
          Name=YueLink
          Comment=Cross-platform proxy client
          Exec=yuelink
          Icon=yuelink
          Type=Application
          Categories=Network;
          StartupNotify=true
          DESKTOP

          if [ -f "assets/icon_desktop.png" ]; then
            cp "assets/icon_desktop.png" "$APPDIR/usr/share/icons/hicolor/256x256/apps/yuelink.png"
            cp "assets/icon_desktop.png" "$APPDIR/yuelink.png"
          fi

          cat > "$APPDIR/AppRun" << 'APPRUN'
          #!/usr/bin/env bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          export LD_LIBRARY_PATH="${HERE}/usr/bin/lib:${LD_LIBRARY_PATH:-}"
          exec "${HERE}/usr/bin/yuelink" "$@"
          APPRUN
          chmod +x "$APPDIR/AppRun"
          ln -sf "usr/share/applications/yuelink.desktop" "$APPDIR/yuelink.desktop"

          # ── Bundle libmpv2 + transitive deps (issue #3) ──────────────
          # Ubuntu 20.04 LTS ships libmpv1 (mpv 0.32) only — running a
          # YueLink AppImage built against libmpv2 fails at launch with
          # "error while loading shared libraries: libmpv.so.2".
          # Use linuxdeploy to copy libmpv.so.2 + its non-system
          # transitive deps (ffmpeg, libass, libplacebo, …) into
          # $APPDIR/usr/bin/lib so AppRun's LD_LIBRARY_PATH picks them
          # up before the system loader. Adds ~50 MB to the AppImage
          # but the alternative (require Ubuntu 22.04+) is a worse
          # user-side experience.
          curl -fSL -o /tmp/linuxdeploy.AppImage \
            "https://github.com/linuxdeploy/linuxdeploy/releases/download/1-alpha-20251107-1/linuxdeploy-x86_64.AppImage"
          echo "c20cd71e3a4e3b80c3483cef793cda3f4e990aca14014d23c544ca3ce1270b4d  /tmp/linuxdeploy.AppImage" \
            | sha256sum -c -
          chmod +x /tmp/linuxdeploy.AppImage
          # GitHub runners disable FUSE; --appimage-extract-and-run is
          # the documented workaround for AppImage tools in CI.
          LIBMPV_PATH=$(ldconfig -p | awk '/libmpv.so.2/ {print $NF; exit}')
          if [ -z "$LIBMPV_PATH" ]; then
            echo "ERROR: libmpv.so.2 not found on the runner — install libmpv-dev or libmpv2"
            exit 1
          fi
          echo "Bundling libmpv from: $LIBMPV_PATH"
          # NO_STRIP=1 keeps debug symbols out of the AppImage but skips
          # the strip pass (faster, smaller diff). DEPLOY_GTK_VERSION
          # avoids the GTK plugin warnings since we're only after libs.
          NO_STRIP=1 APPIMAGE_EXTRACT_AND_RUN=1 \
            /tmp/linuxdeploy.AppImage \
              --appdir "$APPDIR" \
              --executable "$APPDIR/usr/bin/yuelink" \
              --library "$LIBMPV_PATH"
          # linuxdeploy puts libs under $APPDIR/usr/lib by default; our
          # AppRun expects them under usr/bin/lib (matches the existing
          # service-binary layout). Mirror the libs there.
          if [ -d "$APPDIR/usr/lib" ]; then
            mkdir -p "$APPDIR/usr/bin/lib"
            cp -rL "$APPDIR/usr/lib/." "$APPDIR/usr/bin/lib/"
          fi

          APPIMAGE_EXTRACT_AND_RUN=1 ARCH=x86_64 \
            appimagetool "$APPDIR" "$OUTPUT"
          ls -lh "$OUTPUT"

      # ── 2026-06-01 解耦发布: 平台产物直接传 R2, release job 从 R2 取, 不再依赖
      #    GHA artifact。根因: GitHub Actions 存储配额"计量"每 6-12h 才重算, 即使删光
      #    旧 artifact, 配额表仍显示满 → 所有 upload-artifact 失败(含构建产物)→ 卡发布。
      #    走 R2(本就是分发通道)彻底绕开这个计量滞后。aws s3 sync 跨 win/mac/linux 通用。
      # Provenance attestation runs HERE (build job), not in release: the
      # release job downloads only .sha256 sidecars (binaries live in R2), so
      # `subject-path: dist/*` there matched nothing → "Could not find subject"
      # (was continue-on-error, so it silently produced NO attestation). At
      # this point dist/ holds exactly this platform's freshly-built binaries
      # (the .sha256 sidecars are generated inside the publish step below), so
      # each platform attests its own artifact.
      - name: Attest build provenance
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: 'dist/*'

      - name: Publish binaries to R2 (yuelink-dist/<tag>/)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_APP_KEY }}
          R2_ENDPOINT: https://1e192a89cfaab399d211bb1dfe77a5cd.r2.cloudflarestorage.com
          AWS_DEFAULT_REGION: auto
          # R2 + aws-cli v2(runner 自带新版)默认发 CRC32 checksum 头, R2 对部分
          # 操作会拒 → when_required 只在必要时算/校验, 规避不兼容。
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
          BUCKET: yuelink-dist
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          bash scripts/ci/publish_immutable_r2.sh
          echo "✓ 已上传本平台安装包+sha256 到 R2 ($BUCKET/$TAG/)"

      # ── 2026-06-01: 不再上传 GHA artifact。分发与 release job 取件全走 R2,
      #    GHA artifact 已完全冗余;留着只会持续占用 Actions 存储配额(就是它把
      #    配额撑满卡了发布)。彻底去掉 → GitHub 上不再有 yuelink 构建产物。
      #    需要某次构建的二进制时,直接从 R2(yuelink-dist/<tag>/)取。

  # ───────────────────────────────────────────────────────────────────────────
  # Release: download all yuelink-* artifacts, hash, publish, refresh manifest
  # ───────────────────────────────────────────────────────────────────────────
  release:
    name: Create Release
    # Tag-only guard: workflow_dispatch on a branch would otherwise run
    # this job with GITHUB_REF_NAME=<branch>, which would otherwise publish a
    # bogus immutable release candidate. Restrict distribution output strictly
    # to tag pushes — branch dispatches stop at the build matrix.
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build, preflight]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          repository: onesyue/yuelink
          ref: ${{ github.ref_name }}
          ssh-key: ${{ secrets.SRC_DEPLOY_KEY }}
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Set up Flutter for release-candidate verification
        if: needs.preflight.outputs.tag_kind == 'stable'
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Resolve locked verification dependencies
        if: needs.preflight.outputs.tag_kind == 'stable'
        run: flutter pub get --enforce-lockfile

      # 2026-06-01: 只从 R2 下 .sha256(KB 级), 不下 ~5GB 二进制 —— 二进制 build job
      # 已传 R2, release job 只需 sha256 拼 manifest。省 R2 下载带宽(免费档 1GB/天,
      # 下 5GB 一发版就爆顶, 就是本次 'Download Bandwidth Cap 100%' 的根因)。
      - name: Download sha256 sidecars from R2 (not the binaries)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_APP_KEY }}
          R2_ENDPOINT: https://1e192a89cfaab399d211bb1dfe77a5cd.r2.cloudflarestorage.com
          AWS_DEFAULT_REGION: auto
          # R2 + aws-cli v2(runner 自带新版)默认发 CRC32 checksum 头, R2 对部分
          # 操作会拒 → when_required 只在必要时算/校验, 规避不兼容。
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
          BUCKET: yuelink-dist
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          aws s3 sync "s3://$BUCKET/$TAG/" dist/ --endpoint-url "$R2_ENDPOINT" --no-progress \
            --exclude "*" --include "*.sha256"
          echo "下载的 sha256 sidecar:"; ls -1 dist/

      - name: Validate complete release sidecar set
        run: |
          set -euo pipefail
          version="$(sed -n 's/^version:[[:space:]]*\([^+[:space:]]*\).*/\1/p' pubspec.yaml)"
          [ -n "$version" ]
          expected=(
            "YueLink-${version}-android-arm64-v8a.apk"
            "YueLink-${version}-android-armeabi-v7a.apk"
            "YueLink-${version}-android-x86_64.apk"
            "YueLink-${version}-android-universal.apk"
            "YueLink-${version}-ios.ipa"
            "YueLink-${version}-macos-universal.dmg"
            "YueLink-${version}-windows-amd64-setup.exe"
            "YueLink-${version}-windows-amd64-portable.zip"
            "YueLink-${version}-linux-amd64.AppImage"
          )
          actual="$(find dist -maxdepth 1 -type f -name '*.sha256' | wc -l | tr -d ' ')"
          [ "$actual" -eq "${#expected[@]}" ] || {
            echo "::error::expected ${#expected[@]} sidecars, found $actual"
            exit 1
          }
          for file in "${expected[@]}"; do
            sidecar="dist/${file}.sha256"
            test -f "$sidecar"
            grep -Eq '^[0-9a-f]{64}[[:space:]]*$' "$sidecar" || {
              echo "::error::invalid SHA-256 sidecar: $sidecar"
              exit 1
            }
          done

      - name: List release assets
        run: ls -lh dist/

      # ── SBOM generation removed (2026-05-10) ──────────────────────────
      # We used to generate per-binary CycloneDX SBOMs and upload them
      # alongside the binaries — N artifacts × `.sbom.cdx.json` doubled
      # the Release page asset count for marginal user value. Three
      # users in a row asked for it to be cleaned up. The Sigstore
      # provenance attestation below (gh attestation verify) covers
      # the supply-chain story; SBOM as an *uploaded* asset added
      # noise without a downstream consumer.
      #
      # If a future audit needs a SBOM, regenerate locally with
      # `syft <binary> -o cyclonedx-json` against the public release
      # binary — the result is reproducible from the attested artifact.

      - name: Generate .sha256 sidecars + consolidated SHA256SUMS
        run: |
          cd dist
          # Per-binary sidecars: kept because the updater-manifest step
          # downstream reads `dist/$file.sha256` to embed hashes in
          # update.json. NOT uploaded to the Release
          # page (excluded by the `files:` pattern in the Create Release
          # step) — they used to clutter the page with N extra rows.
          for f in *; do
            [ -f "$f" ] || continue
            case "$f" in
              *.sha256|*-SHA256SUMS) ;;
              *) sha256sum "$f" | awk '{print $1}' > "$f.sha256" ;;
            esac
          done
          # Consolidated checksum file in standard `sha256sum -c` format,
          # uploaded as the only checksum asset on the Release page.
          # Users verify everything with `sha256sum -c YueLink-*-SHA256SUMS`.
          # Standard pattern matched by mihomo / sing-box / Hashicorp /
          # Linux kernel releases.
          VERSION=$(grep '^version:' ../pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          SUMS_FILE="YueLink-${VERSION}-SHA256SUMS"
          : > "$SUMS_FILE"
          # 2026-06-01: 二进制不在本地(只下了 .sha256 省带宽), 从 .sha256 sidecar 拼
          # 标准 `sha256sum -c` 格式的 SHA256SUMS(`<hash>  <binary>`)。
          for s in YueLink-*.sha256; do
            [ -f "$s" ] || continue
            bin="${s%.sha256}"
            printf '%s  %s\n' "$(tr -d '[:space:]' < "$s")" "$bin" >> "$SUMS_FILE"
          done
          echo "=== Generated $SUMS_FILE ==="
          cat "$SUMS_FILE"

      - name: Generate release notes
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          TAG="${GITHUB_REF_NAME}"
          NOTES_FILE=""
          # Prerelease detection must mirror the manifest / release-flag
          # branches above. `docs/releases/pre.md` is gone with the pre
          # channel — a `vX.Y.Z-pre` tag needs its own notes file.
          TAG_KIND="$(bash scripts/ci/release_tag.sh kind "$TAG")"
          if [ "$TAG_KIND" = "prerelease" ]; then
            VERSION="${VERSION}-pre"
            TITLE="YueLink v${VERSION} Pre-release"
            [ -f "docs/releases/${TAG}.md" ] && NOTES_FILE="docs/releases/${TAG}.md"
          else
            TITLE="YueLink v${VERSION}"
            [ -f "docs/releases/v${VERSION}.md" ] && NOTES_FILE="docs/releases/v${VERSION}.md"
          fi

          # Resolve previous tag for the Full Changelog link (skip the current
          # one and any `*-pre` variant so stable releases compare to the
          # prior stable tag instead of a prerelease).
          PREV_TAG=$(git tag --sort=-creatordate \
            | grep -E '^v[0-9]' \
            | grep -Fxv "$TAG" \
            | grep -Ev '(^pre$|-pre(\.[0-9]+)?$)' \
            | head -1)

          if [ -n "$NOTES_FILE" ]; then
            cp "$NOTES_FILE" release_notes.md
          else
            # Fallback when docs/releases/<tag>.md is missing: emit a minimal
            # 2026-format body (## Changes + ## Downloads + Full Changelog),
            # no Build footer, no verbose per-file blurbs. Source of truth
            # for the format is the curated docs/releases/*.md files.
            if [ -n "$PREV_TAG" ]; then
              CHANGES=$(git log --pretty=format:"- %s" "${PREV_TAG}..HEAD" -- | head -50)
            else
              CHANGES=$(git log --pretty=format:"- %s" -20)
            fi
            {
              printf '## Changes\n\n'
              printf '%s\n\n' "$CHANGES"
              printf '## Downloads\n\n'
              printf '| 平台 | 文件 | 说明 |\n'
              printf '|---|---|---|\n'
              printf '| Windows | `YueLink-%s-windows-amd64-setup.exe` | 安装版 |\n' "$VERSION"
              printf '| Windows | `YueLink-%s-windows-amd64-portable.zip` | 便携版 |\n' "$VERSION"
              printf '| macOS | `YueLink-%s-macos-universal.dmg` | Universal（Apple Silicon + Intel） |\n' "$VERSION"
              printf '| Android | `YueLink-%s-android-universal.apk` | 通用 |\n' "$VERSION"
              printf '| Android | `YueLink-%s-android-arm64-v8a.apk` | arm64 |\n' "$VERSION"
              printf '| Android | `YueLink-%s-android-armeabi-v7a.apk` | armv7 |\n' "$VERSION"
              printf '| Android | `YueLink-%s-android-x86_64.apk` | x86_64 |\n' "$VERSION"
              printf '| iOS | `YueLink-%s-ios.ipa` | 侧载，iOS 15+（TrollStore / AltStore / SideStore） |\n' "$VERSION"
              printf '| Linux | `YueLink-%s-linux-amd64.AppImage` | x86_64 |\n' "$VERSION"
              printf '\n统一校验文件 `YueLink-%s-SHA256SUMS`，可用 `sha256sum -c` 一次性核对所有产物。\n' "$VERSION"
              printf '\n## Install notes\n\n'
              printf '<details>\n<summary>Windows — SmartScreen 蓝色对话框</summary>\n\n'
              printf 'YueLink 安装包会在配置证书后做 Authenticode 签名；新版本、新证书或下载量较少时，Windows 仍可能弹"已保护你的电脑"。\n'
              printf '点击对话框里的 **More info / 更多信息** → **Run anyway / 仍要运行** 即可。\n'
              printf '担心安全可上传 [VirusTotal](https://www.virustotal.com/) 复核。\n\n</details>\n\n'
              printf '<details>\n<summary>macOS — Gatekeeper "无法验证"</summary>\n\n'
              printf '**首次安装**：右键 .app → 打开（不是双击）。\n'
              printf '**升级后再次出现**：app 内 Settings 顶部已自动 detect + 一键 fix（v1.0.22+）。\n\n</details>\n\n'
              printf '<details>\n<summary>Android — 未知来源 / 出厂限制</summary>\n\n'
              printf '允许浏览器或文件管理器安装未知来源应用即可。\n'
              printf '小米/华为/OPPO 用户：进入 app 后 Settings → 连接修复 → 加入电池优化白名单（v1.0.23+ 有详细解释卡）。\n\n</details>\n\n'
              printf '<details>\n<summary>iOS — 选择 TrollStore / AltStore / SideStore</summary>\n\n'
              printf 'YueLink 没有 App Store 上架。三种侧载方式：\n\n'
              printf '* **TrollStore**（推荐，永久签名）：iOS 14.0–16.6.1 / 17.0 用户首选，安装后永不掉签。直接在 TrollStore 里点 + → 选下载好的 ipa。\n'
              printf '* **AltStore / SideStore**（每 7 天续签）：未越狱用户的标准方案。AltStore 同步签名一次维持 7 天；SideStore 是 fork。\n'
              printf '* **Sideloadly**：连电脑用 Apple ID 签一次，7 天有效。\n\n'
              printf '安装后第一次连接会弹"YueLink 想要添加 VPN 配置"——这是必要权限，点允许即可。\n\n</details>\n\n'
              printf '<details>\n<summary>Linux — Ubuntu 20.04 等老 LTS</summary>\n\n'
              printf 'v1.0.23+ AppImage 内置 libmpv2，所有支持的 LTS 都能直接运行。\n'
              printf 'v1.0.22 及之前的 AppImage 需要系统装 libmpv2（Ubuntu 22.04+ / Debian 12+ / Fedora 36+ 自带，20.04 需 PPA）。\n\n</details>\n'
              # 2026-05-31 硬切:仓库已私有,GitHub compare 链接对用户 404。
              # 完整变更见随包 CHANGELOG / 官网,不再放 github 比较链接。
            } > release_notes.md
          fi
          echo "RELEASE_TITLE=${TITLE}" >> $GITHUB_ENV
          echo "APP_VERSION=${VERSION}" >> $GITHUB_ENV

      # Release-asset guard. Two invariants we want CI to enforce
       # rather than rediscover via the support inbox:
       #   1. No per-binary SBOM/JSON detritus on the Release page —
       #      the SBOM gen step was deleted but a future contributor
       #      could reintroduce it; this catches them.
       #   2. Source archives (zip/tar.gz of the repo) never become
       #      Release assets — softprops globs *.zip would otherwise
       #      sweep them in if anyone dropped one in `dist/`.
      - name: Release asset guard
        run: |
          set -euo pipefail
          cd dist
          stray_sbom=$(find . -maxdepth 1 -name '*.sbom.cdx.json' -o -name '*.cdx.json' | head -5)
          if [ -n "$stray_sbom" ]; then
            echo "::error::per-binary SBOMs found in dist/ — delete them before release upload:"
            echo "$stray_sbom"
            exit 1
          fi
          stray_src=$(find . -maxdepth 1 \( -name 'yuelink-source*' -o -name 'source.zip' -o -name 'source.tar.gz' \) | head -5)
          if [ -n "$stray_src" ]; then
            echo "::error::source archives must not be uploaded as release assets:"
            echo "$stray_src"
            exit 1
          fi
          echo "release asset guard ok"

      # 2026-05-31 硬切:删除 "Create GitHub Release" — 分发不再经 GitHub。
      # 二进制 + manifest 在下方 "Publish to R2" 步上传到 yuetong.app CDN origin。

      # ── Build provenance attestation moved to the build job ─────────────
      # It used to run here, but this release job downloads only the KB-sized
      # .sha256 sidecars (binaries live in R2), so `subject-path: dist/*`
      # matched nothing → "Could not find subject" (masked by
      # continue-on-error → NO attestation was ever produced). Each build
      # job now attests its own freshly-built binary before the R2 upload,
      # where the file is still local. Verify post-release with
      # `gh attestation verify <binary> --owner onesyue`.

      # ── Unsigned updater candidate for the private signing plane ─────────
      - name: Generate updater manifest candidate
        run: |
          VERSION="${{ env.APP_VERSION }}"
          TAG="${GITHUB_REF_NAME}"
          # There is exactly one channel now — stable/`update.json`. The
          # pre-release channel was retired, so a `vX.Y.Z-pre` tag must NOT
          # publish a manifest at all: it still produces test artifacts and a
          # GitHub prerelease, but writing it into update.json would flip
          # every stable user onto an unreleased build.
          TAG_KIND="$(bash scripts/ci/release_tag.sh kind "$TAG")"
          if [ "$TAG_KIND" = "prerelease" ]; then
            echo "::notice::$TAG is a prerelease tag — skipping manifest publish (no pre channel)"
            echo "SKIP_MANIFEST=1" >> "$GITHUB_ENV"
            exit 0
          fi
          MANIFEST_NAME="update.candidate.json"
          CHANNEL="stable"
          # 2026-05-31 硬切:分发走自有 CDN yuetong.app (R2 origin),不再用
          # GitHub Releases。二进制上传到 R2 的 <tag>/ 前缀下。
          BASE="https://yuetong.app/${TAG}"
          # NOT the CDN root: yuetong.app serves R2 objects only — GET /
          # is a 404, and releaseUrl is the client's terminal fallback
          # (iOS post-download, manifest-missing platforms). Point it at
          # the real download page.
          RELEASE_URL="https://yue.to/download.html"
          NOTES=$(head -n 100 release_notes.md | jq -Rs .)

          sha() {
            [ -f "dist/$1.sha256" ] && cat "dist/$1.sha256" | tr -d '[:space:]' || echo ""
          }
          asset() {
            local key="$1"; local fname="$2"
            local hash; hash=$(sha "$fname")
            # 2026-06-01: 二进制在 R2 不在本地, 只校验 .sha256 sidecar 存在(hash 非空)——
            # sidecar 存在即代表该平台二进制已 build+传 R2。不再 `-f dist/$fname` 本地校验。
            [ -z "$hash" ] && return
            jq -n --arg k "$key" --arg u "$BASE/$fname" --arg h "$hash" \
              '{($k): {url: $u, sha256: $h}}'
          }

          PLATFORMS="{}"
          for entry in \
            "android-arm64-v8a:YueLink-${VERSION}-android-arm64-v8a.apk" \
            "android-armeabi-v7a:YueLink-${VERSION}-android-armeabi-v7a.apk" \
            "android-x86_64:YueLink-${VERSION}-android-x86_64.apk" \
            "android-universal:YueLink-${VERSION}-android-universal.apk" \
            "ios:YueLink-${VERSION}-ios.ipa" \
            "macos-universal:YueLink-${VERSION}-macos-universal.dmg" \
            "windows-amd64-setup:YueLink-${VERSION}-windows-amd64-setup.exe" \
            "windows-amd64-portable:YueLink-${VERSION}-windows-amd64-portable.zip" \
            "linux-amd64-appimage:YueLink-${VERSION}-linux-amd64.AppImage" \
          ; do
            key="${entry%%:*}"; file="${entry#*:}"
            new=$(asset "$key" "$file")
            [ -n "$new" ] && PLATFORMS=$(echo "$PLATFORMS" | jq ". + $new")
          done
          [ "$(echo "$PLATFORMS" | jq 'length')" -eq 9 ] || {
            echo "::error::stable manifest must contain all 9 platform artifacts"
            exit 1
          }

          # In the public yuelink-ci mirror GITHUB_SHA belongs to the mirror
          # tag, while checkout points at the private source tag. Use the
          # checked-out source commit so both repositories generate the same
          # reproducible timestamps.
          SOURCE_DATE_EPOCH="$(git show -s --format=%ct HEAD)"
          PUBLISHED_AT="$(date -u -d "@${SOURCE_DATE_EPOCH}" +%Y-%m-%dT%H:%M:%SZ)"
          EXPIRES_AT="$(date -u -d "@$((SOURCE_DATE_EPOCH + 35 * 86400))" +%Y-%m-%dT%H:%M:%SZ)"

          jq -n \
            --argjson schemaVersion 1 \
            --arg keyId "update-manifest-2026-01" \
            --arg version "$VERSION" \
            --arg channel "$CHANNEL" \
            --arg publishedAt "$PUBLISHED_AT" \
            --arg expiresAt "$EXPIRES_AT" \
            --arg releaseUrl "$RELEASE_URL" \
            --argjson notes "$NOTES" \
            --argjson platforms "$PLATFORMS" \
            '{schemaVersion: $schemaVersion, keyId: $keyId, version: $version, channel: $channel, publishedAt: $publishedAt, expiresAt: $expiresAt, releaseUrl: $releaseUrl, notes: $notes, platforms: $platforms}' \
            > "$MANIFEST_NAME"
          echo "MANIFEST_NAME=$MANIFEST_NAME" >> $GITHUB_ENV
          cat "$MANIFEST_NAME" | jq .

      # Updater manifest invariant: every platform URL must point at an
      # actual installer artifact (apk/ipa/dmg/exe/zip/AppImage) — never
      # at a JSON/SBOM/SHA256SUMS/source-zip metadata file. The asset()
      # helper above already filters by sha256-sidecar-existence, so a
      # malformed entry would only sneak in via a future refactor that
      # added one of those files to the iteration list. Cheap defensive
      # check; fails loudly before publishing.
      - name: Manifest URL extension guard
        if: env.SKIP_MANIFEST != '1'
        run: |
          set -euo pipefail
          MANIFEST="${MANIFEST_NAME}"
          [ -f "$MANIFEST" ] || { echo "::error::manifest $MANIFEST missing"; exit 1; }
          # Allow-list of extensions a platform URL may end with.
          ok=$(jq -r '.platforms | to_entries[] | "\(.key)\t\(.value.url)"' "$MANIFEST" \
            | while IFS=$'\t' read -r key url; do
                case "$url" in
                  *.apk|*.ipa|*.dmg|*.exe|*.zip|*.AppImage) echo "OK  $key  $url" ;;
                  *) echo "BAD $key  $url"; exit 1 ;;
                esac
              done) || { echo "::error::manifest URL guard failed:"; echo "$ok"; exit 1; }
          echo "$ok"

      - name: Validate unsigned stable manifest candidate
        if: env.SKIP_MANIFEST != '1'
        run: |
          set -euo pipefail
          jq -e '
            .schemaVersion == 1 and
            .keyId == "update-manifest-2026-01" and
            .channel == "stable" and
            (has("sig") | not) and
            (.platforms | length) == 9 and
            all(.platforms[]; .sha256 | test("^[0-9a-f]{64}$"))
          ' "$MANIFEST_NAME" >/dev/null
          echo "unsigned candidate complete; private signer owns trust"

      # ── Publish immutable candidate to Cloudflare R2 ─────────────────────
      # 2026-05-31 硬切:分发全部走 R2,不再用 GitHub Releases / updater tag。
      # 用 R2 的 S3 兼容端点 + aws-cli(runner 自带)。二进制传到 <tag>/ 前缀,
      # Public CI never receives the updater private key and never writes the
      # bucket-root update.json. The private sign-release-manifest workflow
      # promotes this candidate only after signing and archive verification.
      - name: Publish to R2 (yuetong.app CDN origin)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_APP_KEY }}
          R2_ENDPOINT: https://1e192a89cfaab399d211bb1dfe77a5cd.r2.cloudflarestorage.com
          AWS_DEFAULT_REGION: auto
          # R2 + aws-cli v2(runner 自带新版)默认发 CRC32 checksum 头, R2 对部分
          # 操作会拒 → when_required 只在必要时算/校验, 规避不兼容。
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
          BUCKET: yuelink-dist
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ -z "${AWS_ACCESS_KEY_ID:-}" ]; then
            echo "::error::R2_KEY_ID/R2_APP_KEY secrets 未配置 — 无法发布到 R2"; exit 1
          fi
          # Build jobs already published every installer immutably. Archive the
          # consolidated checksums and unsigned candidate under this immutable
          # tag; clients never consume update.candidate.json.
          if [ "${SKIP_MANIFEST:-0}" != "1" ]; then
            cp "$MANIFEST_NAME" "dist/$MANIFEST_NAME"
          fi
          bash scripts/ci/publish_immutable_r2.sh
          # Prerelease tags intentionally have no candidate. Stable candidates
          # wait for the private signing plane; this job cannot move the root.
          if [ "${SKIP_MANIFEST:-0}" = "1" ]; then
            echo "✓ 已发布安装包到 R2 ($BUCKET/$TAG/) — prerelease, 未发布 manifest"
          else
            echo "✓ 已发布不可变 $TAG/$MANIFEST_NAME + 安装包"
            {
              echo "## Awaiting private manifest signature"
              echo
              echo "Public CI produced \`$TAG/$MANIFEST_NAME\` only."
              echo "Run \`promote_signed_manifest.sh ${APP_VERSION}\` in the"
              echo "protected local/private signing plane after this job succeeds."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Verify immutable candidate and all release artifacts
        if: env.SKIP_MANIFEST != '1'
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5 6 7 8; do
            if dart run scripts/verify_release_artifacts.dart \
                 --version "${{ env.APP_VERSION }}" --candidate; then
              echo "release candidate verification passed on attempt $attempt"
              exit 0
            fi
            echo "::notice::CDN has not converged yet (attempt $attempt/8)"
            sleep 15
          done
          echo "::error::candidate verification failed after CDN propagation window"
          exit 1

  # ───────────────────────────────────────────────────────────────────────────
