  # 理由: prune 是发布后的"清理", 不该让它的失败把整次发版标红(曾因 aws s3 rm
  # 不支持 --no-progress exit 252 误报"发版失败")。每日 prune 保留当前 + 最近
  # 两个完整 stable 版本(约 3GB),既能回滚也远在免费档 10GB 之下。
